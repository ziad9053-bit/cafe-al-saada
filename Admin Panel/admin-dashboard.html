<script src="../Config%20%26%20Scripts/js_auth_config.js"></script>
<script>
    // التأكد من الصلاحية عند فتح الصفحة
    const role = localStorage.getItem('role');
    
    // إذا كنت في صفحة المطبخ، يجب أن يكون الدور إما 'admin' أو 'worker'
    if (window.location.pathname.includes('kitchen.html') && role !== 'admin' && role !== 'worker') {
        window.location.href = "login.html";
    }
    
    // إذا كنت في لوحة المدير، يجب أن يكون الدور 'admin' فقط
    if (window.location.pathname.includes('admin-dashboard.html') && role !== 'admin') {
        window.location.href = "admin-login.html";
    }
</script>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المدير</title>
    <script src="../Config%20%26%20Scripts/dependencies.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">إدارة الأصناف</h1>
        
        <table class="w-full text-right">
            <tbody id="items-list">
                </tbody>
        </table>
        
        <div class="mt-8 flex gap-4">
            <a href="admin.html" class="bg-blue-600 text-white px-4 py-2 rounded">مراقبة الطلبات</a>
            <a href="../index.html" class="text-gray-500">الخروج</a>
        </div>
    </div>
    
    <script src="../Config%20%26%20Scripts/js_admin.js"></script>
</body>
</html>
