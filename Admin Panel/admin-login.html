<script src="../Config%20%26%20Scripts/js_auth_config.js"></script>
<script>
    function checkLogin() {
        const pass = document.getElementById('pass').value;
        // إذا كان الموظف يكتب كلمة السر
        if (verifyLogin(pass, 'admin')) {
            window.location.href = "admin-dashboard.html";
        } else if (verifyLogin(pass, 'worker')) {
            window.location.href = "../Front-end/kitchen.html";
        } else {
            alert("كلمة المرور غير صحيحة!");
        }
    }
</script>
