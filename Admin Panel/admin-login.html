<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المدير</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold mb-6 text-orange-800">دخول المدير</h2>
        <input type="password" id="pass" placeholder="أدخل كلمة المرور" class="w-full border-2 p-3 rounded-lg mb-4 outline-orange-500">
        <button onclick="checkPass()" class="w-full bg-orange-600 text-white p-3 rounded-lg font-bold">دخول</button>
    </div>

    <script>
        function checkPass() {
            const p = document.getElementById('pass').value;
            if(p === "1234") { // استبدل 1234 بكلمة مرور قوية
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = "admin-dashboard.html";
            } else {
                alert("كلمة مرور خاطئة!");
            }
        }
    </script>
</body>
</html>
