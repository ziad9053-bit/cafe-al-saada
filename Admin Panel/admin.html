<div class="bg-white p-6 shadow rounded">
    <h2 class="text-xl font-bold mb-4">إضافة صنف جديد</h2>
    <input type="text" id="itemName" placeholder="اسم الصنف" class="border p-2 w-full mb-2">
    <input type="number" id="itemPrice" placeholder="السعر" class="border p-2 w-full mb-4">
    <button onclick="addItem()" class="bg-blue-600 text-white px-4 py-2 rounded">إضافة</button>
</div>
<div class="mt-8 bg-white p-6 shadow rounded">
    <h2 class="text-xl font-bold mb-4">قائمة الأصناف الحالية</h2>
    <table class="w-full text-right border-collapse">
        <thead>
            <tr class="border-b">
                <th class="p-2">اسم الصنف</th>
                <th class="p-2">السعر</th>
            </tr>
        </thead>
        <tbody id="items-list">
            </tbody>
    </table>
</div>
