<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة القائمة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Config%20&%20Scripts/dependencies.js"></script>
</head>
<body class="bg-slate-50 p-8">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">➕ إضافة صنف جديد</h1>
        
        <div class="space-y-4">
            <input type="text" id="name" placeholder="اسم الصنف" class="w-full p-3 border rounded-xl">
            <input type="number" id="price" placeholder="السعر" class="w-full p-3 border rounded-xl">
            <input type="file" id="imageFile" accept="image/png, image/jpeg, image/webp" class="w-full p-3 border rounded-xl">
            <input type="text" id="category" placeholder="التصنيف" class="w-full p-3 border rounded-xl">
            
            <button onclick="handleSave()" id="saveBtn" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition">
                حفظ الصنف
            </button>
        </div>
    </div>

    <script>
        async function handleSave() {
            const btn = document.getElementById('saveBtn');
            const fileInput = document.getElementById('imageFile');
            const file = fileInput.files[0];
            
            if (!document.getElementById('name').value || !file) {
                return alert("يرجى إدخال البيانات واختيار صورة");
            }

            btn.disabled = true;
            btn.innerText = "جاري المعالجة...";

            try {
                // 1. تحضير اسم الملف (استخدام اسم نظيف)
                const fileExt = file.name.split('.').pop();
                const fileName = `item_${Date.now()}.${fileExt}`;

                // 2. الرفع بدون تمرير contentType يدوياً (Supabase يكتشفه تلقائياً من الملف)
                const { error: uploadError } = await supabase.storage
                    .from('menu-images')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 3. الحصول على الرابط
                const { data } = supabase.storage.from('menu-images').getPublicUrl(fileName);

                // 4. الحفظ في قاعدة البيانات
                const { error: dbError } = await supabase.from('items').insert([{
                    name: document.getElementById('name').value,
                    price: parseFloat(document.getElementById('price').value),
                    category: document.getElementById('category').value,
                    image_url: data.publicUrl,
                    is_available: true
                }]);

                if (dbError) throw dbError;
                
                alert("تمت الإضافة بنجاح!");
                location.reload();

            } catch (error) {
                console.error("خطأ:", error);
                alert("فشل العملية: " + (error.message || "تأكد من إعدادات الـ Bucket"));
                btn.disabled = false;
                btn.innerText = "حفظ الصنف";
            }
        }
    </script>
</body>
</html>
