<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع صور القائمة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Config%20&%20Scripts/dependencies.js?v=6"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-sm border">
        <h2 class="text-xl font-bold mb-4">رفع صور جديدة</h2>
        <input type="file" id="fileInput" accept="image/*" class="w-full p-2 border rounded mb-4">
        <button onclick="uploadImage()" id="uploadBtn" class="w-full bg-blue-600 text-white py-2 rounded font-bold">رفع الصورة</button>
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const btn = document.getElementById('uploadBtn');
            
            if (!file) return alert("اختر صورة أولاً");
            
            btn.disabled = true;
            btn.innerText = "جاري الرفع...";

            try {
                // تنظيف اسم الملف
                const cleanName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
                const fileName = `assets/${Date.now()}_${cleanName}`;
                
                // 1. الرفع للـ Storage
                const { error: uploadError } = await window.supabase.storage
                    .from('menu-images')
                    .upload(fileName, file, { upsert: true });
                
                if (uploadError) throw uploadError;

                // 2. الحصول على الرابط
                const { data } = window.supabase.storage.from('menu-images').getPublicUrl(fileName);

                // 3. حفظ الرابط في قاعدة البيانات
                const { error: dbError } = await window.supabase.from('gallery').insert([
                    { name: file.name, image_url: data.publicUrl }
                ]);
                
                if (dbError) throw dbError;

                alert("تم رفع الصورة وإضافتها للمكتبة بنجاح!");
                fileInput.value = '';
            } catch (err) {
                console.error("تفاصيل الخطأ:", err);
                alert("فشل العملية: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "رفع الصورة";
            }
        }
    </script>
</body>
</html>
