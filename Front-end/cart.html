<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سلة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">طلباتك الحالية:</h1>
        
        <div id="cart-items" class="space-y-4"></div>
        
        <div class="mt-6 p-4 border-t bg-white rounded-lg shadow">
            <label class="block text-gray-700 font-bold mb-2">رقم الطاولة:</label>
            <input type="number" id="tableNo" class="w-full border-2 border-gray-300 rounded-lg p-3 mb-4 outline-none" placeholder="مثلاً: 5">
            
            <button id="confirm-btn" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-green-700">
                تأكيد الطلب
            </button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Config & Scripts/js_supabase.js"></script>
    <script src="../Config & Scripts/js_cart.js"></script>
</body>
</html>
