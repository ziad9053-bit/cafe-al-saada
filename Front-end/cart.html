<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../Config%20&%20Scripts/dependencies.js"></script>
</head>
<body class="bg-gray-50 pb-32">

    <div class="max-w-md mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">سلة الطلبات 🛒</h1>
        
        <div id="cart-items" class="space-y-4">
            </div>
        
        <div class="mt-8 p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-600 font-bold">الإجمالي:</span>
                <span id="cart-total" class="text-2xl font-bold text-orange-600">0 ريال</span>
            </div>

            <label class="block text-gray-700 font-bold mb-2">رقم الطاولة:</label>
            <input type="number" id="tableNo" 
                   class="w-full border-2 border-gray-200 rounded-xl p-4 mb-6 outline-none focus:border-orange-500 transition" 
                   placeholder="مثلاً: 5">
            
            <button id="confirm-btn" onclick="confirmOrder()"
                    class="w-full bg-green-600 text-white p-4 rounded-2xl font-bold text-lg hover:bg-green-700 transition shadow-lg shadow-green-200">
                تأكيد الطلب
            </button>
        </div>
    </div>
    
    <script src="../Config%20&%20Scripts/js_cart.js"></script>
</body>
</html>
