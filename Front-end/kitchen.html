<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المطبخ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="../Config%20&%20Scripts/dependencies.js"></script>
    
    <script src="../Config%20&%20Scripts/js_auth_config.js"></script>
    
    <script>
        // نظام الحماية: يتم التنفيذ فور تحميل الـ head
        const role = localStorage.getItem('role');
        
        // إذا لم يكن هناك دور مسجل، أعده لصفحة الدخول
        if (role !== 'admin' && role !== 'worker') {
            window.location.href = "../Admin%20Panel/admin-login.html";
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

        <div id="orders-container" class="grid gap-4">
            </div>
    </div>

    <script src="../Config%20&%20Scripts/language.js"></script>
    <script src="../Config%20&%20Scripts/js_kitchen.js"></script>
</body>
</html>
