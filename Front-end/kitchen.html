<script src="../Config%20%26%20Scripts/js_auth_config.js"></script>
<script>
    // التأكد من الصلاحية عند فتح الصفحة
    const role = localStorage.getItem('role');
    
    // إذا كنت في صفحة المطبخ، يجب أن يكون الدور إما 'admin' أو 'worker'
    if (window.location.pathname.includes('kitchen.html') && role !== 'admin' && role !== 'worker') {
        window.location.href = "login.html";
    }
    
    // إذا كنت في لوحة المدير، يجب أن يكون الدور 'admin' فقط
    if (window.location.pathname.includes('admin-dashboard.html') && role !== 'admin') {
        window.location.href = "admin-login.html";
    }
</script>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المطبخ</title>
    <script src="../Config%20%26%20Scripts/dependencies.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">طلبات المطبخ</h1>
        
        <div id="orders-container" class="grid gap-4">
            </div>
    </div>

    <script src="../Config%20%26%20Scripts/js_kitchen.js"></script>
</body>
</html>
