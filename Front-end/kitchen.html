<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة العامل — المطبخ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Config%20&%20Scripts/dependencies.js?v=6"></script>
    <script src="../Config%20&%20Scripts/js_auth_config.js"></script>
    <script>
        const role = localStorage.getItem("role");
        if (role !== "admin" && role !== "worker") {
            window.location.href = "../Admin%20Panel/admin-login.html";
        }
    </script>
</head>
<body class="bg-black text-white min-h-screen p-4 pb-10">
    <div class="max-w-lg mx-auto">
        <header class="text-center mb-6 pt-2">
            <p class="text-xs tracking-widest text-amber-700">WORKER PANEL</p>
            <h1 class="text-2xl font-bold text-amber-400 mt-1">استقبال الطلبات</h1>
            <p class="text-zinc-500 text-xs mt-2">طلب جديد → اضغط لفتح → قيد التجهيز → تم التجهيز</p>
        </header>

        <div id="orders-container" class="grid gap-4">
            <p class="text-zinc-500 text-center p-8">جاري التحميل...</p>
        </div>

        <a href="../index.html" class="block text-center mt-8 text-zinc-600 hover:text-amber-500 text-sm">العودة للرئيسية</a>
    </div>

    <script src="../Config%20&%20Scripts/js_kitchen.js?v=4"></script>
</body>
</html>
