<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المشروبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Config%20&%20Scripts/dependencies.js?v=6"></script>
    <script src="../Config%20&%20Scripts/language.js"></script>
    <link rel="stylesheet" href="../Config%20&%20Scripts/theme.css" />
    <style>body.has-bottom-nav { padding-bottom: 5.5rem; }</style>
</head>
<body class="app-theme min-h-screen">
    <div class="app-vignette fixed inset-0 pointer-events-none z-0"></div>
    <header class="relative z-10 p-6 pt-8 text-center">
        <p class="gold-text-soft text-xs tracking-widest">CAFE AL-SAADA</p>
        <h1 id="page-title" class="text-2xl gold-title mt-1">قائمة المشروبات</h1>
    </header>

    <main id="menu-items" class="relative z-10 max-w-xl mx-auto grid grid-cols-1 gap-4 px-4">
        <p class="gold-text-soft text-center py-8">جاري التحميل...</p>
    </main>

    <a href="../Admin%20Panel/admin-login.html"
        class="fixed bottom-[5.25rem] left-1/2 -translate-x-1/2 text-[10px] text-zinc-600 hover:text-amber-500 z-40">
        دخول العامل
    </a>

    <script>
        const cat = new URLSearchParams(window.location.search).get("cat");
        const titles = {
            hot: "المشروبات الساخنة",
            cold: "المشروبات الباردة",
            dessert: "الحلى",
        };
        if (!cat || !titles[cat]) {
            window.location.replace("../index.html");
        } else {
            document.getElementById("page-title").textContent = titles[cat];
        }
    </script>
    <script src="../Config%20&%20Scripts/js_categories.js"></script>
    <script src="../Config%20&%20Scripts/js_menu.js?v=5"></script>
    <script src="../Config%20&%20Scripts/bottom-nav.js"></script>
</body>
</html>
