<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المشروبات</title>
    <script src="https://cdn.tailwindcss.com?v=16"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=16"></script>
    <script src="../config-scripts/dependencies.js?v=16"></script>
    <script src="../config-scripts/language.js?v=16"></script>
    <link rel="stylesheet" href="../config-scripts/theme.css?v=16" />
    <style>body.has-bottom-nav { padding-bottom: 5.5rem; }</style>
</head>
<body class="app-theme min-h-screen">
    <div class="app-vignette fixed inset-0 pointer-events-none z-0"></div>
    <header class="relative z-10 p-6 pt-8 text-center">
        <p class="gold-text-soft text-xs tracking-widest">CAFE AL-SAADA</p>
        <h1 id="page-title" class="text-2xl gold-title mt-1">قائمة المشروبات</h1>
    </header>

    <main id="menu-items" class="relative z-10 max-w-xl mx-auto grid grid-cols-1 gap-4 px-4">
        <p class="gold-text-soft text-center py-8">جاري التحميل...</p>
    </main>

    <a href="../admin-panel/admin-login.html"
        class="fixed bottom-[5.25rem] left-1/2 -translate-x-1/2 text-[10px] text-zinc-600 hover:text-amber-500 z-40">
        دخول العامل
    </a>

    <script src="../config-scripts/js_categories.js?v=16"></script>
    <script src="../config-scripts/js_menu.js?v=16"></script>
    <script src="../config-scripts/bottom-nav.js?v=16"></script>
    <script>
        const cat = new URLSearchParams(window.location.search).get("cat");
        
        async function setMenuTitle() {
            const settings = await window.loadAppSettings();
            const titles = {
                hot: phrase(settings, "category_hot_label", "المشروبات الساخنة"),
                cold: phrase(settings, "category_cold_label", "المشروبات الباردة"),
                dessert: phrase(settings, "category_dessert_label", "الحلى"),
                custom1: phrase(settings, "category_custom1_label", "صنف إضافي 1"),
                custom2: phrase(settings, "category_custom2_label", "صنف إضافي 2"),
            };
            
            if (!cat || !titles[cat]) {
                window.location.replace("../index.html");
            } else {
                document.getElementById("page-title").textContent = titles[cat];
            }
        }
        
        document.addEventListener("DOMContentLoaded", () => {
            if (window.getSupabaseClient?.()) setMenuTitle();
        });
        window.addEventListener("supabaseReady", setMenuTitle);
    </script>
</body>
</html>
