<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الطلب | مقهى السعادة</title>
    <script src="https://cdn.tailwindcss.com?v=16"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=16"></script>
    <script src="../config-scripts/dependencies.js?v=16"></script>
    <script src="../config-scripts/js_app_settings.js?v=16"></script>
    <style>
        body {
            background: radial-gradient(ellipse at top, #1a1508 0%, #000 55%);
        }
        .gold-text { color: #d4af37; }
        .gold-border { border-color: rgba(212, 175, 55, 0.45); }
        .hero-glow {
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.25);
        }
    </style>
</head>
<body class="min-h-[100dvh] text-white p-4 pb-10">
    <div class="max-w-md mx-auto">
        <header class="text-center pt-4 pb-2">
            <p id="brand-en" class="text-xs tracking-[0.35em] text-amber-600/80 uppercase">Cafe Al-Saada</p>
            <h1 id="brand-ar" class="text-3xl font-bold gold-text mt-1">مقهى السعادة</h1>
        </header>

        <div id="heroWrap" class="mt-4 rounded-2xl overflow-hidden gold-border border-2 hero-glow bg-black aspect-[4/3] relative hidden">
            <img id="heroImage" src="" alt="صورة الطلب" loading="lazy" class="w-full h-full object-cover opacity-90" />
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
            <div class="absolute bottom-0 right-0 left-0 p-4 text-center">
                <p id="heroCaption" class="gold-text font-bold text-lg drop-shadow-lg"></p>
            </div>
        </div>

        <div class="mt-5 text-center">
            <span id="statusBadge" class="inline-block px-4 py-1.5 rounded-full text-sm font-bold border gold-border bg-zinc-900 gold-text">
                جاري التحميل...
            </span>
        </div>

        <p id="orderMeta" class="text-center mt-3 text-amber-200/90 text-sm font-semibold"></p>

        <div class="mt-6 rounded-2xl border gold-border bg-zinc-950/90 overflow-hidden">
            <div class="px-4 py-3 border-b gold-border bg-black/60">
                <h2 class="text-lg font-bold gold-text">تفاصيل الطلب</h2>
            </div>
            <ul id="orderItemsList" class="px-3 py-2 max-h-64 overflow-y-auto text-sm">
                <li class="py-6 text-zinc-500 text-center">جاري تحميل الطلب...</li>
            </ul>
            <div class="px-4 py-4 border-t gold-border flex justify-between items-center bg-black/50">
                <span class="text-zinc-400">المجموع الكلي</span>
                <span id="orderTotal" class="text-2xl font-bold gold-text">—</span>
            </div>
        </div>

        <p id="readyMessage" class="hidden mt-5 text-center text-emerald-400 font-bold text-lg animate-pulse">
            ✓ الطلب جاهز للاستلام
        </p>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        const orderId = query.get("orderId");
        const orderCode = query.get("code");
        let appSettings = mergeSettings(null);

        function applyOrderViewBranding() {
            const en = document.getElementById("brand-en");
            const ar = document.getElementById("brand-ar");
            if (en) en.textContent = phrase(appSettings, "order_view_brand_en");
            if (ar) ar.textContent = phrase(appSettings, "order_view_brand_ar");
        }

        function applyLayoutSettings() {
            const ui = appSettings?.ui || {};
            // set gold color and font size
            const goldColor = ui.gold_color || '#D4AF37';
            document.querySelectorAll('.gold-text').forEach(el => el.style.color = goldColor);
            // set CSS var for app font size
            if (ui.text_font_size) document.documentElement.style.setProperty('--app-font-size', ui.text_font_size + 'px');

            // تطبيق الإطار واللون للأقسام الرئيسية
            const heroWrap = document.getElementById('heroWrap');
            if (heroWrap) {
                if (ui.border_width !== undefined) heroWrap.style.borderWidth = ui.border_width + 'px';
                heroWrap.style.borderColor = goldColor;
            }

            const orderMeta = document.getElementById('orderMeta');
            if (orderMeta) orderMeta.style.display = ui.show_code_text === false ? 'none' : '';
        }

        function parseItems(raw) {
            if (!raw) return [];
            if (Array.isArray(raw)) return raw;
            try {
                const p = JSON.parse(raw);
                return Array.isArray(p) ? p : [];
            } catch {
                return [];
            }
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function setStatusUi(status) {
            const badge = document.getElementById("statusBadge");
            const readyMsg = document.getElementById("readyMessage");
            const isReady = status === "completed";
            if (status === "completed") {
                badge.textContent = "تم الاستلام";
                badge.className =
                    "inline-block px-4 py-1.5 rounded-full text-sm font-bold border border-emerald-500/60 bg-emerald-950 text-emerald-400";
                readyMsg.textContent = phrase(appSettings, "order_view_completed_msg");
                readyMsg.classList.remove("hidden");
            } else if (status === "ready") {
                badge.textContent = "جاهز للاستلام";
                badge.className =
                    "inline-block px-4 py-1.5 rounded-full text-sm font-bold border border-emerald-500/60 bg-emerald-950 text-emerald-400";
                readyMsg.textContent = phrase(appSettings, "order_view_ready_msg");
                readyMsg.classList.remove("hidden");
            } else if (status === "preparing") {
                badge.textContent = "قيد التجهيز";
                badge.className =
                    "inline-block px-4 py-1.5 rounded-full text-sm font-bold border border-amber-500/60 bg-amber-950 gold-text";
                readyMsg.classList.add("hidden");
            } else {
                badge.textContent = "بانتظار العامل";
                badge.className =
                    "inline-block px-4 py-1.5 rounded-full text-sm font-bold border gold-border bg-zinc-900 gold-text";
                readyMsg.classList.add("hidden");
            }
        }

        function renderOrder(order) {
            const items = parseItems(order.items);
            const list = document.getElementById("orderItemsList");
            const priceDisplay = `${parseFloat(order.total_price || 0).toFixed(2)} ريال`;
            document.getElementById("orderMeta").textContent =
                `طاولة ${order.table_no ?? "—"} · ${priceDisplay}`;

            if (items.length === 0) {
                list.innerHTML =
                    '<li class="py-6 text-zinc-500 text-center">لا توجد أصناف</li>';
            } else {
                list.innerHTML = items
                    .map((item) => {
                        const qty = parseInt(item.quantity) || 1;
                        const price = parseFloat(item.price) || 0;
                        const img =
                            item.image_url ||
                            "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=200&h=200&fit=crop";
                        return `
                        <li class="flex gap-3 items-center py-3 border-b border-zinc-800/80 last:border-0">
                            <img src="${escapeHtml(img)}" alt="صورة الصنف" loading="lazy" class="w-14 h-14 rounded-xl object-cover border gold-border flex-shrink-0" />
                            <div class="flex-1 min-w-0">
                                <p class="font-bold gold-text truncate">${escapeHtml(item.name || "صنف")}</p>
                                <p class="text-zinc-500 text-xs">${price} ر.س × ${qty}</p>
                            </div>
                            <span class="gold-text font-bold">${price * qty} ر.س</span>
                        </li>`;
                    })
                    .join("");
            }

            const total =
                order.total_price != null
                    ? parseFloat(order.total_price)
                    : items.reduce(
                          (s, i) =>
                              s + (parseFloat(i.price) || 0) * (parseInt(i.quantity) || 1),
                          0
                      );
            document.getElementById("orderTotal").textContent = `${total} ر.س`;

            const firstWithImage = items.find((i) => i.image_url);
            const heroWrap = document.getElementById("heroWrap");
            const heroImg = document.getElementById("heroImage");
            const heroCaption = document.getElementById("heroCaption");
            if (firstWithImage?.image_url) {
                heroImg.src = firstWithImage.image_url;
                heroCaption.textContent = firstWithImage.name || "طلبك من مقهى السعادة";
                heroWrap.classList.remove("hidden");
            } else if (items.length > 0) {
                heroImg.src =
                    "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&h=600&fit=crop";
                heroCaption.textContent = items[0].name || "طلبك";
                heroWrap.classList.remove("hidden");
            }

            setStatusUi(order.status);
        }

        async function loadOrder() {
            const client = window.getSupabaseClient?.();
            if (!orderId && !orderCode) {
                document.getElementById("statusBadge").textContent = "رابط غير صالح";
                return;
            }
            if (!client) return;

            let request = client
                .from("orders")
                .select("id, status, order_code, table_no, items, total_price, created_at");

            request = orderCode
                ? request.eq("order_code", orderCode)
                : request.eq("id", orderId);

            const { data, error } = await request.single();

            if (error || !data) {
                document.getElementById("statusBadge").textContent = "الطلب غير موجود";
                document.getElementById("orderItemsList").innerHTML =
                    '<li class="py-6 text-red-400 text-center">تعذر تحميل الطلب. تأكد أن الرابط صحيح وأن الموقع يعمل عبر http وليس ملف محلي.</li>';
                return;
            }

            renderOrder(data);

            const resolvedId = data.id;
            client
                .channel(`order_view_${resolvedId}`)
                .on(
                    "postgres_changes",
                    {
                        event: "UPDATE",
                        schema: "public",
                        table: "orders",
                        filter: `id=eq.${resolvedId}`,
                    },
                    (payload) => {
                        if (payload.new) renderOrder({ ...data, ...payload.new });
                    }
                )
                .subscribe();
        }

        async function init() {
            appSettings = await loadAppSettings();
            applyOrderViewBranding();
            applyLayoutSettings();
            if (window.getSupabaseClient?.()) loadOrder();
        }
        window.addEventListener("supabaseReady", init);
        if (document.readyState !== "loading") init();
        else document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
