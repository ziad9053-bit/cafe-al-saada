<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المقهى - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h1 class="text-2xl font-bold mb-6">مرحباً بك!</h1>
        <input type="text" id="tableNumber" placeholder="رقم الطاولة" 
               class="w-full p-3 border border-gray-300 rounded mb-4 text-center">
        <button id="startBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
            ابدأ الطلب
        </button>
    </div>

    <script src="../Config%20&%20Scripts/js_supabase.js"></script>
    <script src="../Config%20&%20Scripts/js_app.js"></script>
    <script src="../Config%20&%20Scripts/js_kitchen.js"></script>
    
    <script>
        document.getElementById('startBtn').addEventListener('click', async () => {
            const table = document.getElementById('tableNumber').value;
            if (!table) {
                alert('يرجى إدخال رقم الطاولة');
                return;
            }
            
            if (typeof startOrder === 'function') {
                await startOrder(table);
            } else {
                console.error("دالة startOrder غير معرفة في js_app.js");
            }
        });
    </script>
</body>
</html>
