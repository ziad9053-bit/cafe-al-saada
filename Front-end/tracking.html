<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع الطلب</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js?v=2"></script>
    <script src="../config-scripts/dependencies.js?v=17"></script>
    <script src="../config-scripts/js_app_settings.js?v=17"></script>
    <style>
        #qrBox {
            width: 14rem;
            height: 14rem;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e5e5e5;
            box-shadow: none;
        }
        #qrHost {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #qrHost canvas {
            display: block;
            width: 12.5rem !important;
            height: 12.5rem !important;
            image-rendering: pixelated;
        }
        .order-item-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="bg-black text-white min-h-[100dvh] flex items-center justify-center p-4 pb-8">
    <div class="w-full max-w-md bg-zinc-900 border border-yellow-600/40 rounded-3xl p-6 shadow-2xl">
        <!-- QR فعلي يُولَّد محلياً ويُمسح بالكاميرا -->
        <div id="qrBox" class="mx-auto rounded-2xl p-2 flex items-center justify-center">
            <div id="qrHost" aria-label="رمز QR للطلب"></div>
        </div>
        <p id="qrCodeLabel" class="text-center text-xl text-yellow-400 font-bold mt-3 tracking-wide"></p>
        <p id="tracking-scan-hint" class="hidden text-center text-xs text-amber-600/80 mt-1">امسح الرمز لفتح صفحة الطلب</p>

        <div class="mt-6 space-y-1">
            <h1 id="tracking-title" class="text-2xl font-bold text-yellow-400 text-center">شكراً لطلبك</h1>
            <p id="subText" class="text-zinc-300 mb-5 text-sm text-center">انتظر تحويل اللون إلى الأخضر عند اكتمال التجهيز</p>
        </div>

        <div id="qrNetworkBanner" class="hidden mt-4 p-3 rounded-xl border border-amber-600/50 bg-amber-950/40 text-right text-sm">
            <p class="text-amber-200 font-bold mb-2">⚠️ الرابط الحالي لا يعمل من الجوال</p>
            <p class="text-zinc-400 text-xs mb-2">أدخل عنوان جهازك على شبكة الواي فاي (من cmd اكتب: ipconfig)</p>
            <input id="publicBaseInput" type="text" dir="ltr"
                placeholder="http://192.168.1.10:5500/front-end/"
                class="w-full p-2 rounded-lg bg-black border border-amber-700/50 text-amber-100 text-xs mb-2" />
            <button type="button" id="savePublicBaseBtn"
                class="w-full py-2 rounded-lg bg-amber-600 text-black font-bold text-sm hover:bg-amber-500">
                حفظ وتحديث QR
            </button>
        </div>
        <p id="qrLinkPreview" class="hidden mt-2 text-[10px] text-zinc-500 break-all text-center px-2" dir="ltr"></p>

        <div class="mt-4 text-center">
            <p class="text-zinc-400 text-sm">حالة الطلب</p>
            <p id="statusText" class="text-xl font-bold text-yellow-400 mt-1">قيد التحضير</p>
        </div>

        <p id="orderMeta" class="mt-3 text-center text-yellow-500/90 text-sm font-semibold"></p>

        <!-- تفاصيل الطلب -->
        <div class="mt-6 rounded-2xl border border-yellow-600/25 bg-zinc-950/80 overflow-hidden">
            <div class="px-4 py-3 border-b border-yellow-600/20 bg-zinc-900/90">
                <h2 class="text-lg font-bold text-yellow-400">تفاصيل الطلب</h2>
            </div>
            <ul id="orderItemsList" class="divide-y divide-zinc-800 px-4 py-2 max-h-52 overflow-y-auto text-sm">
                <li class="py-4 text-zinc-500 text-center">جاري تحميل التفاصيل...</li>
            </ul>
            <div class="px-4 py-3 border-t border-yellow-600/20 flex justify-between items-center">
                <span class="text-zinc-400">المجموع الكلي</span>
                <span id="orderTotal" class="text-xl font-bold text-yellow-400">—</span>
            </div>
        </div>

        <a href="menu.html" class="block text-center mt-6 text-yellow-500 hover:text-yellow-300 underline text-sm">العودة للقائمة</a>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        const orderId = query.get("orderId");

        const qrBox = document.getElementById("qrBox");
        const qrHost = document.getElementById("qrHost");
        let qrInstance = null;
        const statusText = document.getElementById("statusText");
        const subText = document.getElementById("subText");
        const orderMeta = document.getElementById("orderMeta");
        const orderItemsList = document.getElementById("orderItemsList");
        const orderTotal = document.getElementById("orderTotal");

        let currentOrder = null;
        let readySoundPlayed = false;
        let appSettings = mergeSettings(null);

        const QR_COLOR_GOLD = "#D4AF37";
        const QR_COLOR_GREEN = "#22C55E";

        function isQrReadyStatus(status) {
            return status === "ready" || status === "completed";
        }

        function getQrFillColor(status) {
            return isQrReadyStatus(status) ? QR_COLOR_GREEN : QR_COLOR_GOLD;
        }

        function hexToRgb(hex) {
            const h = String(hex).replace("#", "");
            return {
                r: parseInt(h.slice(0, 2), 16),
                g: parseInt(h.slice(2, 4), 16),
                b: parseInt(h.slice(4, 6), 16),
            };
        }

        /** تلوين مربعات QR يدوياً (المكتبة أحياناً تبقيهم أسود) */
        function paintQrCanvas(canvas, fillHex) {
            const ctx = canvas.getContext("2d");
            if (!ctx) return;
            const { r, g, b } = hexToRgb(fillHex);
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                const lum = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
                if (lum < 200) {
                    d[i] = r;
                    d[i + 1] = g;
                    d[i + 2] = b;
                    d[i + 3] = 255;
                } else {
                    d[i] = 255;
                    d[i + 1] = 255;
                    d[i + 2] = 255;
                    d[i + 3] = 255;
                }
            }
            ctx.putImageData(img, 0, 0);
        }

        function applyQrLabelStyle(status) {
            const label = document.getElementById("qrCodeLabel");
            if (!label) return;
            // use colors from app settings if available
            const ui = appSettings?.ui || {};
            const gold = ui.gold_color || '#D4AF37';
            const silver = ui.silver_color || '#C0C0C0';
            const color = isQrReadyStatus(status) ? (ui.green_color || '#22C55E') : gold;
            label.style.color = color;
        }

        function applyTrackingPhrases() {
            const t = document.getElementById("tracking-title");
            const scan = document.getElementById("tracking-scan-hint");
            if (t) t.textContent = phrase(appSettings, "tracking_title");
            if (scan) scan.textContent = phrase(appSettings, "tracking_scan_hint");
            if (subText && !currentOrder) subText.textContent = phrase(appSettings, "tracking_sub_pending");
        }

        function applyLayoutSettings() {
            const ui = appSettings?.ui || {};
            // always keep QR box at the top (moved in HTML)
            // hide the small explanation text under the code by default
            const scanHint = document.getElementById('tracking-scan-hint');
            if (scanHint) scanHint.style.display = ui.show_code_text === false ? 'none' : 'none';
            // apply font size if provided
            if (ui.text_font_size) document.documentElement.style.setProperty('--app-font-size', ui.text_font_size + 'px');
            // apply QR label color immediately
            applyQrLabelStyle(currentOrder?.status);
        }

        /** رابط صفحة الطلب — يجب أن يكون عاماً (ليس localhost) */
        function buildOrderPageUrl(order) {
            const code = order.order_code;
            const qs = code
                ? `code=${encodeURIComponent(code)}`
                : `orderId=${encodeURIComponent(order.id)}`;
            const base = window.resolveSiteBase?.();
            if (base) return new URL(`order-view.html?${qs}`, base).href;
            return new URL(`order-view.html?${qs}`, window.location.href).href;
        }

        function updateQrNetworkUi() {
            const banner = document.getElementById("qrNetworkBanner");
            const preview = document.getElementById("qrLinkPreview");
            const needsSetup =
                window.isLocalOnlyEnvironment?.() && !window.resolveSiteBase?.();
            banner.classList.toggle("hidden", !needsSetup);
            if (currentOrder) {
                const url = buildOrderPageUrl(currentOrder);
                preview.textContent = url;
                preview.classList.remove("hidden");
                if (needsSetup) {
                    preview.classList.add("text-amber-500");
                } else {
                    preview.classList.remove("text-amber-500");
                }
            }
        }

        function savePublicBaseAndRefreshQr() {
            const input = document.getElementById("publicBaseInput");
            window.setCafePublicBase?.(input.value);
            updateQrNetworkUi();
            if (currentOrder) renderQr(currentOrder).catch(console.error);
        }

        function parseItems(raw) {
            if (!raw) return [];
            if (Array.isArray(raw)) return raw;
            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function renderOrderDetails(order) {
            const items = parseItems(order.items);
            if (items.length === 0) {
                orderItemsList.innerHTML =
                    '<li class="py-4 text-zinc-500 text-center">لا توجد أصناف مسجّلة</li>';
            } else {
                orderItemsList.innerHTML = items
                    .map((item) => {
                        const qty = parseInt(item.quantity) || 1;
                        const price = parseFloat(item.price) || 0;
                        const lineTotal = price * qty;
                        return `
                        <li class="order-item-row py-3 flex justify-between gap-3 border-b border-zinc-800">
                            <div class="text-right flex-1">
                                <p class="font-bold text-zinc-100">${escapeHtml(item.name || "صنف")}</p>
                                <p class="text-zinc-500 text-xs mt-0.5">${price} ر.س × ${qty}</p>
                            </div>
                            <span class="text-yellow-400 font-bold whitespace-nowrap">${lineTotal} ر.س</span>
                        </li>`;
                    })
                    .join("");
            }

            const total =
                order.total_price != null
                    ? parseFloat(order.total_price)
                    : items.reduce(
                          (s, i) =>
                              s + (parseFloat(i.price) || 0) * (parseInt(i.quantity) || 1),
                          0
                      );
            orderTotal.textContent = `${total} ر.س`;

            const priceText = `${parseFloat(order.total_price || 0)} ريال`;
            orderMeta.textContent = `طاولة ${order.table_no ?? "—"} · ${priceText}`;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        /** QR: المربعات نفسها ذهبية أو خضراء (ليس الإطار) */
        async function renderQr(order) {
            const url = buildOrderPageUrl(order);
            const fillColor = getQrFillColor(order.status);

            const priceText = `${parseFloat(order.total_price || 0)} ريال`;
            document.getElementById("qrCodeLabel").textContent = priceText;
            applyQrLabelStyle(order.status);
            qrHost.innerHTML = "";

            const hex = fillColor.replace("#", "");
            const drawFallbackImg = () => {
                qrHost.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&ecc=H&margin=8&color=${hex}&bgcolor=FFFFFF&data=${encodeURIComponent(url)}" width="200" height="200" alt="QR" style="display:block" />`;
            };

            if (typeof QRCode === "undefined" || typeof QRCode.toCanvas !== "function") {
                drawFallbackImg();
                return;
            }

            try {
                const canvas = document.createElement("canvas");
                qrHost.appendChild(canvas);
                await QRCode.toCanvas(canvas, url, {
                    width: 280,
                    margin: 2,
                    errorCorrectionLevel: "H",
                    color: { dark: fillColor, light: "#FFFFFF" }, // استخدام اللون مباشرة من المكتبة لثباته
                });
            } catch (err) {
                console.error("فشل توليد QR:", err);
                drawFallbackImg();
            }
        }

        function playReadySound() {
            if (readySoundPlayed) return;
            readySoundPlayed = true;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.35);
            } catch (_) {}
        }

        function updateUiForStatus(status) {
            const isPreparing = status === "preparing" || status === "pending";

            if (status === "completed") {
                applyQrLabelStyle(status);
                statusText.classList.remove("text-yellow-400");
                statusText.classList.add("text-emerald-400");
                statusText.textContent = phrase(appSettings, "tracking_status_completed");
                subText.textContent = phrase(appSettings, "tracking_sub_completed");
            } else if (status === "ready") {
                applyQrLabelStyle(status);
                statusText.classList.remove("text-yellow-400");
                statusText.classList.add("text-emerald-400");
                statusText.textContent = phrase(appSettings, "tracking_status_ready");
                subText.textContent = phrase(appSettings, "tracking_sub_ready");
                playReadySound();
            } else if (isPreparing) {
                applyQrLabelStyle(status);
                statusText.classList.remove("text-emerald-400");
                statusText.classList.add("text-yellow-400");
                statusText.textContent =
                    status === "preparing"
                        ? phrase(appSettings, "tracking_status_preparing")
                        : phrase(appSettings, "tracking_status_waiting");
                subText.textContent = phrase(appSettings, "tracking_sub_pending");
            }
            if (currentOrder) {
                currentOrder.status = status;
                renderQr(currentOrder).catch(console.error);
            }
        }

        async function loadOrder() {
            const client = window.getSupabaseClient?.();
            if (!orderId) {
                statusText.textContent = "لم يُعثر على رقم الطلب";
                statusText.classList.add("text-red-400");
                return;
            }
            if (!client) return;

            const { data, error } = await client
                .from("orders")
                .select("id, status, order_code, table_no, items, total_price, created_at")
                .eq("id", orderId)
                .single();

            if (error || !data) {
                statusText.textContent = "تعذر تحميل الطلب";
                statusText.classList.remove("text-yellow-400");
                statusText.classList.add("text-red-400");
                orderItemsList.innerHTML =
                    '<li class="py-4 text-red-400 text-center">تعذر جلب التفاصيل</li>';
                return;
            }

            currentOrder = data;
            renderOrderDetails(data);
            await renderQr(data);
            updateUiForStatus(data.status);
            updateQrNetworkUi();
        }

        function subscribeToOrder() {
            const client = window.getSupabaseClient?.();
            if (!orderId || !client) return;

            client
                .channel(`order_track_${orderId}`)
                .on(
                    "postgres_changes",
                    {
                        event: "UPDATE",
                        schema: "public",
                        table: "orders",
                        filter: `id=eq.${orderId}`,
                    },
                    (payload) => {
                        const next = payload.new;
                        if (next) {
                            currentOrder = { ...currentOrder, ...next };
                            renderOrderDetails(currentOrder);
                            updateUiForStatus(next.status);
                        }
                    }
                )
                .subscribe();
        }

        async function init() {
            appSettings = await loadAppSettings();
            applyTrackingPhrases();
            applyLayoutSettings();
            const saved = window.getCafePublicBase?.();
            if (saved) {
                document.getElementById("publicBaseInput").value = saved;
            }
            document.getElementById("savePublicBaseBtn")?.addEventListener("click", savePublicBaseAndRefreshQr);
            if (window.getSupabaseClient?.()) {
                loadOrder();
                subscribeToOrder();
            }
            
            // إعادة التحقق من الطلب عند عودة المستخدم لتبويب المتصفح (مهم للجوال)
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    loadOrder();
                }
            });
        }

        window.addEventListener("supabaseReady", init);
        if (document.readyState !== "loading") init();
        else document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
