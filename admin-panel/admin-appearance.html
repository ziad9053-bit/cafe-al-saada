<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل المظهر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config-scripts/dependencies.js?v=6"></script>
    <script src="../config-scripts/js_app_settings.js"></script>
    <script src="../config-scripts/js_auth_config.js"></script>
    <script>if (localStorage.getItem("role") !== "admin") location.href = "admin-login.html";</script>
</head>
<body class="bg-black text-white min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <a href="admin-dashboard.html" class="text-amber-500 text-sm hover:text-amber-300">← لوحة المدير</a>
        <h1 class="text-2xl font-bold text-amber-400 mt-4 mb-2">تعديل عام — مظهر التطبيق</h1>
        <p class="text-zinc-500 text-sm mb-6">اختر الصور من المكتبة. المعاينة على اليمين كما يراها الزبون تقريباً.</p>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="space-y-5">
                <div class="p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
                    <p class="text-amber-400 font-bold mb-2">خلفية الصفحة الرئيسية</p>
                    <div id="pick-bg" class="grid grid-cols-4 gap-2 max-h-28 overflow-y-auto"></div>
                </div>
                <div class="p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
                    <p class="text-amber-400 font-bold mb-2">الشعار</p>
                    <div id="pick-logo" class="grid grid-cols-4 gap-2 max-h-28 overflow-y-auto"></div>
                </div>
                <div class="p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
                    <p class="text-amber-400 font-bold mb-2">صورة صف — مشروبات ساخنة</p>
                    <div id="pick-hot" class="grid grid-cols-4 gap-2 max-h-28 overflow-y-auto"></div>
                </div>
                <div class="p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
                    <p class="text-amber-400 font-bold mb-2">صورة صف — مشروبات باردة</p>
                    <div id="pick-cold" class="grid grid-cols-4 gap-2 max-h-28 overflow-y-auto"></div>
                </div>
                <div class="p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
                    <p class="text-amber-400 font-bold mb-2">صورة صف — الحلى</p>
                    <div id="pick-dessert" class="grid grid-cols-4 gap-2 max-h-28 overflow-y-auto"></div>
                </div>
                <button type="button" id="saveBtn"
                    class="w-full py-4 rounded-xl bg-amber-600 hover:bg-amber-500 text-black font-bold text-lg">
                    حفظ المظهر
                </button>
            </div>

            <div class="rounded-2xl border border-amber-700/40 overflow-hidden bg-zinc-900 sticky top-4 h-fit">
                <p class="text-center text-xs text-amber-600/80 py-2 border-b border-amber-800/30">معاينة الواجهة الرئيسية</p>
                <div id="preview" class="relative min-h-[520px] p-4 text-white">
                    <div id="preview-bg" class="absolute inset-0 opacity-40" style="background-size:contain;background-repeat:no-repeat;background-position:center"></div>
                    <div class="relative z-10 text-center pt-6">
                        <p id="preview-brand" class="text-[10px] tracking-widest text-amber-600/80">CAFE</p>
                        <img id="preview-logo" class="w-16 h-16 mx-auto mt-2 rounded-full object-contain bg-zinc-900 border-2 border-amber-600/50 hidden" alt="" />
                        <div id="preview-logo-ph" class="w-16 h-16 mx-auto mt-2 rounded-full bg-zinc-800 flex items-center justify-center text-2xl">☕</div>
                        <h2 class="text-xl font-bold text-amber-400 mt-3">أهلاً بك</h2>
                    </div>
                    <div class="relative z-10 mt-6 space-y-3 px-2">
                        <div id="preview-hot" class="h-16 rounded-xl border border-amber-700/40 bg-zinc-900" style="background-size:contain;background-repeat:no-repeat;background-position:center"></div>
                        <div id="preview-cold" class="h-16 rounded-xl border border-amber-700/40 bg-zinc-900" style="background-size:contain;background-repeat:no-repeat;background-position:center"></div>
                        <div id="preview-dessert" class="h-16 rounded-xl border border-amber-700/40 bg-zinc-900" style="background-size:contain;background-repeat:no-repeat;background-position:center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let settings = mergeSettings(null);
        let activePick = "background_image";

        const pickMap = {
            background_image: { grid: "pick-bg", preview: "preview-bg", prop: "background_image" },
            logo_image: { grid: "pick-logo", preview: "preview-logo", prop: "logo_image", hidePh: "preview-logo-ph" },
            category_hot_image: { grid: "pick-hot", preview: "preview-hot", prop: "category_hot_image" },
            category_cold_image: { grid: "pick-cold", preview: "preview-cold", prop: "category_cold_image" },
            category_dessert_image: { grid: "pick-dessert", preview: "preview-dessert", prop: "category_dessert_image" },
        };

        function updatePreview() {
            const bg = document.getElementById("preview-bg");
            if (settings.background_image) {
                bg.style.backgroundImage = `url('${settings.background_image}')`;
                bg.style.backgroundSize = "contain";
                bg.style.backgroundRepeat = "no-repeat";
                bg.style.backgroundPosition = "center";
            }
            const logo = document.getElementById("preview-logo");
            if (settings.logo_image) {
                logo.src = settings.logo_image;
                logo.classList.remove("hidden");
                document.getElementById("preview-logo-ph").classList.add("hidden");
            }
            ["hot", "cold", "dessert"].forEach((c) => {
                const el = document.getElementById(`preview-${c}`);
                const url = settings[`category_${c}_image`];
                if (el && url) {
                    el.style.backgroundImage = `url('${url}')`;
                    el.style.backgroundSize = "contain";
                    el.style.backgroundRepeat = "no-repeat";
                    el.style.backgroundPosition = "center";
                }
            });
        }

        function renderGallery(images) {
            Object.entries(pickMap).forEach(([key, cfg]) => {
                const grid = document.getElementById(cfg.grid);
                grid.innerHTML = images
                    .map(
                        (img) => `
                    <img src="${img.image_url}" data-url="${img.image_url}" data-key="${key}"
                        class="pick-thumb w-full h-14 object-contain bg-zinc-900 rounded cursor-pointer border-2 border-transparent hover:border-amber-500" />`
                    )
                    .join("");
            });
            document.querySelectorAll(".pick-thumb").forEach((thumb) => {
                thumb.addEventListener("click", () => {
                    const k = thumb.dataset.key;
                    const url = thumb.dataset.url;
                    settings[pickMap[k].prop] = url;
                    document.querySelectorAll(`[data-key="${k}"]`).forEach((t) => t.classList.remove("border-amber-500"));
                    thumb.classList.add("border-amber-500");
                    updatePreview();
                });
            });
        }

        async function init() {
            settings = await loadAppSettings(true);
            updatePreview();
            const client = window.getSupabaseClient();
            const { data } = await client.from("gallery").select("image_url, name").order("created_at", { ascending: false });
            renderGallery(data || []);
        }

        document.getElementById("saveBtn").addEventListener("click", async () => {
            const btn = document.getElementById("saveBtn");
            btn.disabled = true;
            btn.textContent = "جاري الحفظ...";
            try {
                // read UI controls into settings.ui
                settings.ui = settings.ui || {};
                const fsEl = document.getElementById('ui_font_size');
                const bwEl = document.getElementById('ui_box_width');
                const bhEl = document.getElementById('ui_box_height');
                const gcEl = document.getElementById('ui_gold_color');
                const scEl = document.getElementById('ui_silver_color');
                const gotEl = document.getElementById('ui_gold_on_top');
                const sctEl = document.getElementById('ui_show_code_text');

                settings.ui.text_font_size = fsEl ? parseInt(fsEl.value || 16, 10) : 16;
                settings.ui.box_width = bwEl ? parseInt(bwEl.value || 220, 10) : 220;
                settings.ui.box_height = bhEl ? parseInt(bhEl.value || 220, 10) : 220;
                settings.ui.gold_color = gcEl ? gcEl.value : '#D4AF37';
                settings.ui.silver_color = scEl ? scEl.value : '#C0C0C0';
                settings.ui.gold_on_top = gotEl ? gotEl.checked : false;
                settings.ui.show_code_text = sctEl ? sctEl.checked : false;

                await saveAppSettings(settings);
                alert("تم حفظ المظهر بنجاح!");
            } catch (e) {
                alert("فشل الحفظ: " + e.message + "\n\nشغّل supabase-settings-migration.sql في Supabase");
            } finally {
                btn.disabled = false;
                btn.textContent = "حفظ المظهر";
            }
        });

        window.addEventListener("supabaseReady", init);
        if (window.getSupabaseClient?.()) init();
    </script>
</body>
</html>
