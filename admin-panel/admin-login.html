<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../config-scripts/js_auth_config.js?v=16"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-96 text-center">
        <h2 class="text-xl font-bold mb-4">تسجيل الدخول</h2>
        <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-2 border rounded mb-4 focus:outline-none focus:border-orange-500">
        <button onclick="checkLogin()" class="w-full bg-orange-600 text-white py-2 rounded hover:bg-orange-700 transition">
            دخول
        </button>
    </div>

    <script>
        async function checkLogin() {
            const passEl = document.getElementById('pass');
            const pass = passEl ? passEl.value : '';
            
            if (verifyLogin(pass, 'admin')) {
                localStorage.setItem('role', 'admin');
                window.location.href = "admin-dashboard.html";
            } 
            else if (verifyLogin(pass, 'worker')) {
                localStorage.setItem('role', 'worker');
                // هذا هو التعديل الوحيد المطلوب: توجيه العامل للمطبخ مباشرة
                window.location.href = "../Front-end/kitchen.html?v=16";
            } 
            else {
                alert("كلمة المرور غير صحيحة!");
            }
        }
    </script>
</body>
</html>
