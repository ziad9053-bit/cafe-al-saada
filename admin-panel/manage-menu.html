<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة القائمة - مقهى السعادة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config-scripts/dependencies.js?v=17"></script>
    <script src="../config-scripts/js_categories.js"></script>
    <script src="../config-scripts/js_auth_config.js"></script>
    <link rel="stylesheet" href="../config-scripts/theme.css?v=17" />
    <script>if (localStorage.getItem("role") !== "admin") location.href = "admin-login.html";</script>
    <style>
        .admin-card {
            background: linear-gradient(135deg, rgba(30, 30, 38, 0.8) 0%, rgba(20, 20, 24, 0.9) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 184, 74, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .admin-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(232, 184, 74, 0.3);
            color: #f5d76e;
            transition: all 0.3s ease;
        }
        .admin-input:focus {
            border-color: #e8b84a;
            box-shadow: 0 0 10px rgba(232, 184, 74, 0.2);
            outline: none;
        }
        .admin-input::placeholder {
            color: rgba(245, 215, 110, 0.4);
        }
        .admin-btn {
            background: linear-gradient(to bottom, #f5d76e 0%, #e8b84a 100%);
            color: #1a1a1a;
            border: none;
            box-shadow: 0 4px 15px rgba(232, 184, 74, 0.3);
            transition: all 0.3s ease;
        }
        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 184, 74, 0.4);
            background: linear-gradient(to bottom, #fde28a 0%, #f5d76e 100%);
        }
        .gallery-wrap {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(232, 184, 74, 0.2);
        }
    </style>
</head>
<body class="app-theme min-h-screen p-4 md:p-8 relative">
    <div id="app-bg-layer" class="hidden"></div>
    <div class="app-vignette absolute inset-0 pointer-events-none z-[1]"></div>
    
    <div class="max-w-2xl mx-auto relative z-10 animate-fade-in">
        <div class="flex items-center gap-4 mb-6">
            <a href="admin-dashboard.html" class="text-sm px-4 py-2 rounded-full border border-amber-700/50 text-amber-400 hover:bg-amber-950/50 backdrop-blur-sm transition">
                &larr; لوحة المدير
            </a>
            <a href="edit-items.html" class="text-sm px-4 py-2 rounded-full border border-amber-600 bg-amber-950/40 text-amber-300 hover:bg-amber-900/60 backdrop-blur-sm transition flex items-center gap-2">
                ✏️ تعديل الأصناف الموجودة
            </a>
        </div>

        <div class="admin-card p-6 rounded-3xl w-full mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-amber-400">تفعيل وتسمية الأصناف الإضافية</h2>
                <button type="button" id="saveCustomCatsBtn" class="text-xs px-4 py-2 rounded-xl bg-amber-600/90 hover:bg-amber-500 text-black font-bold transition">
                    حفظ التفعيل
                </button>
            </div>
            <p class="text-xs text-zinc-400 mb-4">يمكنك تفعيل صنفين احتياطيين ليظهرا للزبائن وتحديد أسمائهما بحرية.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Custom 1 -->
                <div class="p-4 rounded-2xl bg-black/40 border border-amber-800/30">
                    <label class="flex items-center gap-2 text-sm text-amber-200 mb-3 cursor-pointer">
                        <input type="checkbox" id="toggle_custom1" class="w-4 h-4 accent-amber-500">
                        تفعيل الصنف الأول
                    </label>
                    <input type="text" id="name_custom1" placeholder="اسم الصنف (مثال: سندويشات)" class="admin-input w-full p-2 text-sm rounded-lg">
                </div>
                <!-- Custom 2 -->
                <div class="p-4 rounded-2xl bg-black/40 border border-amber-800/30">
                    <label class="flex items-center gap-2 text-sm text-amber-200 mb-3 cursor-pointer">
                        <input type="checkbox" id="toggle_custom2" class="w-4 h-4 accent-amber-500">
                        تفعيل الصنف الثاني
                    </label>
                    <input type="text" id="name_custom2" placeholder="اسم الصنف (مثال: سناكات)" class="admin-input w-full p-2 text-sm rounded-lg">
                </div>
            </div>
        </div>

        <div class="admin-card p-8 rounded-3xl w-full">
            <div class="flex items-center gap-3 mb-8 border-b border-amber-800/30 pb-4">
                <div class="w-12 h-12 rounded-full bg-amber-950/50 border border-amber-500/30 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(232,184,74,0.15)]">
                    ➕
                </div>
                <div>
                    <h1 class="text-2xl font-bold gold-title">إضافة صنف جديد</h1>
                    <p class="text-xs gold-text-soft mt-1">أدخل تفاصيل الصنف الجديد لإضافته لقائمة المقهى</p>
                </div>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm gold-text-soft mb-1">اسم الصنف</label>
                    <input type="text" id="name" placeholder="مثال: لاتيه حار..." class="admin-input w-full p-3 rounded-xl">
                </div>
                
                <div>
                    <label class="block text-sm gold-text-soft mb-1">السعر (ريال)</label>
                    <input type="number" id="price" placeholder="مثال: 15.00" class="admin-input w-full p-3 rounded-xl">
                </div>
                
                <div>
                    <label class="block text-sm gold-text-soft mb-1">التصنيف</label>
                    <select id="category" class="admin-input w-full p-3 rounded-xl">
                        <option value="hot" class="bg-zinc-900 text-amber-100">مشروبات ساخنة</option>
                        <option value="cold" class="bg-zinc-900 text-amber-100">مشروبات باردة</option>
                        <option value="dessert" class="bg-zinc-900 text-amber-100">الحلى</option>
                    </select>
                </div>
                
                <div class="pt-2">
                    <label class="block text-sm gold-text-soft mb-2">اختر صورة من المكتبة</label>
                    <div id="galleryGrid" class="gallery-wrap grid grid-cols-4 gap-3 p-3 rounded-xl h-48 overflow-y-auto">
                        <!-- يتم جلب الصور هنا -->
                    </div>
                </div>
                
                <div class="pt-4 mt-4 border-t border-amber-800/30">
                    <button onclick="handleSave()" id="saveBtn" class="admin-btn w-full font-bold py-3 rounded-xl text-lg flex items-center justify-center gap-2">
                        حفظ وإضافة الصنف
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedImageUrl = "";
        let currentSettings = null;

        function escapeHtml(s) {
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        async function loadGalleryForMenu() {
            const client = window.getSupabaseClient?.();
            if (!client) return;
            const { data, error } = await client.from("gallery").select("*").order("id", { ascending: false });
            if (error) return console.error("خطأ في جلب الصور:", error);

            const grid = document.getElementById("galleryGrid");
            if (!grid) return;
            grid.innerHTML = "";
            if (!data || data.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-zinc-500 text-sm py-8">المكتبة فارغة. يرجى رفع صور أولاً.</p>';
                return;
            }

            (data || []).forEach((img) => {
                grid.innerHTML += `
                    <img src="${img.image_url}" onclick="selectImage('${img.image_url}', this)" 
                         class="cursor-pointer rounded-xl border-2 border-transparent hover:border-amber-500/50 w-full h-20 object-cover shadow-sm bg-black/50 transition">`;
            });
        }
        
        document.addEventListener("DOMContentLoaded", async () => {
            if (window.getSupabaseClient?.()) {
                loadGalleryForMenu();
                currentSettings = await window.loadAppSettings();
                setupCustomCategoriesUI(currentSettings);
            }
        });
        window.addEventListener("supabaseReady", async () => {
            if (!currentSettings) {
                loadGalleryForMenu();
                currentSettings = await window.loadAppSettings();
                setupCustomCategoriesUI(currentSettings);
            }
        });

        function setupCustomCategoriesUI(s) {
            document.getElementById('toggle_custom1').checked = s?.ui?.show_custom1 || false;
            document.getElementById('toggle_custom2').checked = s?.ui?.show_custom2 || false;
            document.getElementById('name_custom1').value = s?.phrases?.category_custom1_label || "";
            document.getElementById('name_custom2').value = s?.phrases?.category_custom2_label || "";

            const select = document.getElementById('category');
            if (s?.ui?.show_custom1) {
                select.insertAdjacentHTML('beforeend', `<option value="custom1" class="bg-zinc-900 text-amber-100">${escapeHtml(s.phrases.category_custom1_label)}</option>`);
            }
            if (s?.ui?.show_custom2) {
                select.insertAdjacentHTML('beforeend', `<option value="custom2" class="bg-zinc-900 text-amber-100">${escapeHtml(s.phrases.category_custom2_label)}</option>`);
            }
        }

        document.getElementById('saveCustomCatsBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveCustomCatsBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الحفظ...';
            
            const payload = {
                phrases: {
                    category_custom1_label: document.getElementById('name_custom1').value.trim() || "صنف إضافي 1",
                    category_custom2_label: document.getElementById('name_custom2').value.trim() || "صنف إضافي 2"
                },
                ui: {
                    show_custom1: document.getElementById('toggle_custom1').checked,
                    show_custom2: document.getElementById('toggle_custom2').checked
                }
            };

            try {
                await window.saveAppSettings(payload);
                alert("تم حفظ إعدادات الأصناف الإضافية بنجاح!");
                location.reload();
            } catch(e) {
                alert("فشل الحفظ: " + e.message);
                btn.disabled = false;
                btn.textContent = 'حفظ التفعيل';
            }
        });

        function selectImage(url, element) {
            selectedImageUrl = url;
            document.querySelectorAll('#galleryGrid img').forEach(img => {
                img.classList.remove('border-amber-400', 'shadow-[0_0_10px_rgba(232,184,74,0.5)]');
                img.classList.add('border-transparent');
            });
            element.classList.remove('border-transparent');
            element.classList.add('border-amber-400', 'shadow-[0_0_10px_rgba(232,184,74,0.5)]');
        }

        async function handleSave() {
            if (!selectedImageUrl) return alert("يرجى اختيار صورة من المكتبة أولاً!");

            const nameEl = document.getElementById('name');
            const priceEl = document.getElementById('price');
            
            if (!nameEl.value.trim()) return alert("يرجى كتابة اسم الصنف.");
            if (!priceEl.value || parseFloat(priceEl.value) <= 0) return alert("يرجى إدخال سعر صحيح.");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = `جاري الحفظ...`;

            try {
                const client = window.getSupabaseClient?.();
                if (!client) throw new Error("قاعدة البيانات غير متصلة");
                
                const catEl = document.getElementById('category');
                const { error } = await client.from("items").insert([{
                    name: nameEl.value.trim(),
                    price: parseFloat(priceEl.value),
                    category: catEl ? catEl.value : "hot",
                    image_url: selectedImageUrl,
                    is_available: true
                }]);

                if (error) throw error;
                alert("تمت إضافة الصنف بنجاح للـ " + catEl.options[catEl.selectedIndex].text + "!");
                location.reload();
            } catch (error) {
                alert("فشل الحفظ: " + error.message);
                btn.disabled = false;
                btn.innerHTML = `حفظ وإضافة الصنف`;
            }
        }
    </script>
</body>
</html>
