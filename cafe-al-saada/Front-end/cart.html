<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../config-scripts/theme.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="cart-page app-theme min-h-screen pb-8">
    <div class="max-w-md mx-auto p-6">
        <a href="../index.html" class="inline-flex items-center gap-2 text-amber-500 text-sm mb-6 hover:text-amber-300">
            ← العودة للرئيسية
        </a>

        <h1 class="text-2xl gold-title mb-6">سلة الطلبات 🛒</h1>

        <div id="cart-items" class="space-y-4"></div>

        <div class="mt-8 p-6 bg-zinc-900 rounded-2xl border border-amber-800/30">
            <div class="flex justify-between items-center mb-6">
                <span class="text-zinc-400 font-bold">الإجمالي:</span>
                <span id="cart-total" class="text-2xl font-bold text-amber-400">0 ريال</span>
            </div>

            <label class="block text-amber-200/90 font-bold mb-2">رقم الطاولة:</label>
            <input type="number" id="tableNo"
                class="w-full bg-black border-2 border-amber-800/40 rounded-xl p-4 mb-6 text-white outline-none focus:border-amber-500"
                placeholder="مثلاً: 5">

            <button id="confirm-btn"
                class="w-full bg-amber-600 hover:bg-amber-500 text-black p-4 rounded-2xl font-bold text-lg transition shadow-lg">
                تأكيد الطلب
            </button>
        </div>
    </div>

    <script src="../config-scripts/dependencies.js?v=6"></script>
    <script src="../config-scripts/js_cart.js?v=3"></script>
</body>
</html>
