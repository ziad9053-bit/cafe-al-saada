<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل العبارات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config-scripts/dependencies.js?v=6"></script>
    <script src="../config-scripts/js_app_settings.js"></script>
    <script>
        if (localStorage.getItem("role") !== "admin") location.href = "admin-login.html";
    </script>
</head>
<body class="bg-black text-white min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <a href="admin-dashboard.html" class="text-amber-500 text-sm hover:text-amber-300">← لوحة المدير</a>
        <h1 class="text-2xl font-bold text-amber-400 mt-4 mb-2">تعديل العبارات</h1>
        <p class="text-zinc-500 text-sm mb-6">كل حقل يوضح أين تظهر العبارة في التطبيق.</p>

        <div class="mb-6 p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
            <p class="text-amber-400 font-bold mb-4">إعدادات النص والرموز</p>
            <div class="grid grid-cols-1 gap-3">
                <label class="text-zinc-400 text-sm">حجم النص (px)
                    <input id="ui_font_size" type="number" min="10" max="48" class="w-full mt-1 p-2 rounded bg-black border border-amber-700/30" />
                </label>
                <div class="flex gap-2">
                    <label class="flex-1 text-zinc-400 text-sm">عرض الصندوق (px)
                        <input id="ui_box_width" type="number" min="80" max="800" class="w-full mt-1 p-2 rounded bg-black border border-amber-700/30" />
                    </label>
                    <label class="flex-1 text-zinc-400 text-sm">طول الصندوق (px)
                        <input id="ui_box_height" type="number" min="80" max="800" class="w-full mt-1 p-2 rounded bg-black border border-amber-700/30" />
                    </label>
                </div>
                <div class="flex gap-2">
                    <label class="flex-1 text-zinc-400 text-sm">لون الكود الذهبي
                        <input id="ui_gold_color" type="color" class="w-full mt-1 h-10 rounded" />
                    </label>
                    <label class="flex-1 text-zinc-400 text-sm">لون الكود الفضي
                        <input id="ui_silver_color" type="color" class="w-full mt-1 h-10 rounded" />
                    </label>
                </div>
                <label class="flex items-center gap-3 text-zinc-400 text-sm">
                    <input id="ui_gold_on_top" type="checkbox" class="w-4 h-4" /> اجعل الكود (ذهبي/فضي) أعلى
                </label>
                <label class="flex items-center gap-3 text-zinc-400 text-sm">
                    <input id="ui_show_code_text" type="checkbox" class="w-4 h-4" /> إظهار نص الشرح تحت الكود
                </label>
            </div>
        </div>

        <div id="phrases-form" class="space-y-4"></div>

        <button type="button" id="saveBtn"
            class="w-full mt-8 py-4 rounded-xl bg-amber-600 hover:bg-amber-500 text-black font-bold text-lg sticky bottom-4">
            حفظ جميع العبارات
        </button>
    </div>

    <script>
        const PHRASE_FIELDS = [
            { key: "brand_tagline", label: "اسم العلامة (إنجليزي)", location: "🏠 الرئيسية — السطر فوق الشعار" },
            { key: "home_welcome_title", label: "عنوان الترحيب", location: "🏠 الرئيسية — العنوان الذهبي الكبير" },
            { key: "home_welcome_sub", label: "نص تحت الترحيب", location: "🏠 الرئيسية — تحت العنوان مباشرة" },
            { key: "category_row_hint", label: "كلمة «تصفح» على الصفوف", location: "🏠 الرئيسية — أعلى كل صف تصنيف" },
            { key: "category_hot_label", label: "عنوان صف الساخن", location: "🏠 الرئيسية — داخل صورة المشروبات الساخنة" },
            { key: "category_cold_label", label: "عنوان صف البارد", location: "🏠 الرئيسية — داخل صورة المشروبات الباردة" },
            { key: "category_dessert_label", label: "عنوان صف الحلى", location: "🏠 الرئيسية — داخل صورة الحلى" },
            { key: "tracking_title", label: "عنوان صفحة التتبع", location: "📱 بعد تأكيد الطلب — أعلى رمز QR مباشرة" },
            { key: "tracking_scan_hint", label: "تلميح مسح QR", location: "📱 صفحة التتبع — السطر الصغير تحت رمز QR" },
            { key: "tracking_sub_pending", label: "نص تحت QR (قبل الجاهزية)", location: "📱 صفحة التتبع — تحت QR أثناء الانتظار/التجهيز" },
            { key: "tracking_status_waiting", label: "حالة: بانتظار العامل", location: "📱 صفحة التتبع — سطر «حالة الطلب»" },
            { key: "tracking_status_preparing", label: "حالة: قيد التجهيز", location: "📱 صفحة التتبع — عندما يبدأ العامل" },
            { key: "tracking_status_ready", label: "حالة: جاهز للاستلام", location: "📱 صفحة التتبع — عند تم التجهيز (QR أخضر)" },
            { key: "tracking_sub_ready", label: "نص تحت QR (جاهز)", location: "📱 صفحة التتبع — تحت QR عندما يصبح أخضر" },
            { key: "tracking_status_completed", label: "حالة: تم الاستلام", location: "📱 صفحة التتبع — بعد تم الاستلام" },
            { key: "tracking_sub_completed", label: "نص تحت QR (بعد الاستلام)", location: "📱 صفحة التتبع — تحت QR النهائي بعد الاستلام" },
            { key: "order_view_brand_en", label: "العلامة إنجليزي", location: "🔗 صفحة QR عند المسح — أعلى الصفحة" },
            { key: "order_view_brand_ar", label: "اسم المقهى عربي", location: "🔗 صفحة QR — العنوان الرئيسي" },
            { key: "order_view_ready_msg", label: "رسالة الجاهزية", location: "🔗 صفحة QR — عند جاهزية الطلب" },
            { key: "order_view_completed_msg", label: "رسالة بعد الاستلام", location: "🔗 صفحة QR — بعد تم الاستلام" },
        ];

        let settings = mergeSettings(null);

        function renderForm() {
            const form = document.getElementById("phrases-form");
            form.innerHTML = PHRASE_FIELDS.map(
                (f) => `
                <div class="p-4 rounded-xl border border-amber-800/30 bg-zinc-950">
                    <div class="flex flex-wrap justify-between gap-2 mb-2">
                        <span class="font-bold text-amber-300 text-sm">${f.label}</span>
                        <span class="text-[11px] text-zinc-500 bg-zinc-900 px-2 py-1 rounded">${f.location}</span>
                    </div>
                    <input type="text" data-phrase-key="${f.key}" value="${(settings.phrases[f.key] || "").replace(/"/g, "&quot;")}"
                        class="w-full p-3 rounded-lg bg-black border border-amber-800/40 text-white text-sm focus:border-amber-500 outline-none" />
                </div>`
            ).join("");
        }

        async function init() {
            settings = await loadAppSettings(true);
            renderForm();
        }

        document.getElementById("saveBtn").addEventListener("click", async () => {
            // Save phrases
            document.querySelectorAll("[data-phrase-key]").forEach((input) => {
                settings.phrases[input.dataset.phraseKey] = input.value;
            });
            // Save UI settings
            settings.ui = settings.ui || {};
            settings.ui.text_font_size = parseInt(document.getElementById('ui_font_size').value || settings.ui.text_font_size || 16, 10);
            settings.ui.box_width = parseInt(document.getElementById('ui_box_width').value || settings.ui.box_width || 220, 10);
            settings.ui.box_height = parseInt(document.getElementById('ui_box_height').value || settings.ui.box_height || 220, 10);
            settings.ui.gold_color = document.getElementById('ui_gold_color').value || settings.ui.gold_color || '#D4AF37';
            settings.ui.silver_color = document.getElementById('ui_silver_color').value || settings.ui.silver_color || '#C0C0C0';
            settings.ui.gold_on_top = document.getElementById('ui_gold_on_top').checked;
            settings.ui.show_code_text = document.getElementById('ui_show_code_text').checked;
            
            const btn = document.getElementById("saveBtn");
            btn.disabled = true;
            btn.textContent = "جاري الحفظ...";
            try {
                await saveAppSettings(settings);
                alert("تم حفظ العبارات والإعدادات!");
            } catch (e) {
                alert("فشل الحفظ: " + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "حفظ جميع العبارات";
            }
        });
        
        // populate UI controls from settings when loaded
        async function populateUiControls() {
            settings = await loadAppSettings();
            const ui = settings.ui || {};
            document.getElementById('ui_font_size').value = ui.text_font_size || 16;
            document.getElementById('ui_box_width').value = ui.box_width || 220;
            document.getElementById('ui_box_height').value = ui.box_height || 220;
            document.getElementById('ui_gold_color').value = ui.gold_color || '#D4AF37';
            document.getElementById('ui_silver_color').value = ui.silver_color || '#C0C0C0';
            document.getElementById('ui_gold_on_top').checked = ui.gold_on_top === true;
            document.getElementById('ui_show_code_text').checked = ui.show_code_text !== false;
        }

        window.addEventListener("supabaseReady", () => {
            init();
            populateUiControls();
        });
        if (window.getSupabaseClient?.()) {
            init();
            populateUiControls();
        }
    </script>
</body>
</html>
