<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقهى السعادة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-scripts/dependencies.js?v=17"></script>
    <script src="config-scripts/js_app_settings.js?v=17"></script>
    <link rel="stylesheet" href="config-scripts/theme.css?v=17" />
    <style>
        body.has-bottom-nav { padding-bottom: 5.5rem; }
        #app-bg-layer {
            position: fixed;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.5;
            z-index: 0;
        }
        .category-row {
            display: flex;
            flex-direction: row;
            direction: ltr;
            position: relative;
            height: 8.5rem;
            border-radius: 1.25rem;
            overflow: hidden;
            background: linear-gradient(135deg, #1e1e26 0%, #141418 100%);
            border: 2px solid rgba(232, 184, 74, 0.5);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .category-img-wrap {
            flex: 0 0 50%;
            max-width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0.35rem 0.25rem 0.35rem 0.5rem;
            background: rgba(0,0,0,0.25);
        }
        .category-cover-img {
            width: 100%;
            height: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: left center;
            pointer-events: none;
        }
        .category-row:hover {
            transform: scale(1.02);
            border-color: rgba(245, 215, 110, 0.85);
            box-shadow: 0 6px 28px rgba(232, 184, 74, 0.2);
        }
        .category-row::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 48%, rgba(0,0,0,0.82) 100%);
            pointer-events: none;
        }
        .category-row-content {
            position: relative;
            z-index: 2;
            flex: 1;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 1.25rem 0 0.5rem;
        }
        .category-label-title {
            font-size: 1.45rem;
            line-height: 1.25;
        }
        .category-label-hint {
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="app-theme min-h-screen">
    <div id="app-bg-layer" class="hidden"></div>
    <div class="app-vignette absolute inset-0 pointer-events-none z-[1]"></div>

    <button type="button" onclick="location.href='admin-panel/admin-login.html'"
        class="fixed top-4 left-4 z-50 text-amber-400 border border-amber-700/50 px-3 py-1.5 rounded-full text-xs">المدير</button>
    <a href="admin-panel/admin-login.html"
        class="fixed top-4 right-4 z-50 text-amber-400 border border-amber-700/50 px-3 py-1.5 rounded-full text-xs">العامل</a>

    <div class="relative z-10 max-w-lg mx-auto px-4 pt-2 pb-4">

        <div class="flex flex-col items-center mb-6">
            <div class="relative p-1 rounded-full border-2 border-amber-600/30 shadow-[0_0_50px_rgba(232,184,74,0.15)]">
                <img id="app-logo" loading="lazy" class="hidden w-32 h-32 rounded-full object-contain bg-zinc-950/50 border border-amber-600/50" alt="شعار المقهى" />
                <div id="app-logo-emoji" class="w-32 h-32 rounded-full bg-zinc-900/50 flex items-center justify-center text-5xl">☕</div>
            </div>
            <p id="app-slogan" class="mt-4 text-2xl font-bold gold-text text-center tracking-wide uppercase"></p>
        </div>

        <div class="space-y-4">
            <a href="Front-end/menu.html?cat=hot" class="category-row" data-category-cover="hot">
                <div class="category-img-wrap">
                    <img class="category-cover-img" alt="صورة التصنيف" loading="lazy" hidden />
                </div>
                <div class="category-row-content">
                    <div class="text-right w-full">
                        <p data-category-hint="hot" class="category-label-hint gold-text-soft mb-1">تصفح</p>
                        <h2 data-category-label="hot" class="category-label-title gold-title">المشروبات الساخنة</h2>
                    </div>
                </div>
            </a>
            <a href="Front-end/menu.html?cat=cold" class="category-row" data-category-cover="cold">
                <div class="category-img-wrap">
                    <img class="category-cover-img" alt="صورة التصنيف" loading="lazy" hidden />
                </div>
                <div class="category-row-content">
                    <div class="text-right w-full">
                        <p data-category-hint="cold" class="category-label-hint gold-text-soft mb-1">تصفح</p>
                        <h2 data-category-label="cold" class="category-label-title gold-title">المشروبات الباردة</h2>
                    </div>
                </div>
            </a>
            <a href="Front-end/menu.html?cat=dessert" class="category-row" data-category-cover="dessert">
                <div class="category-img-wrap">
                    <img class="category-cover-img" alt="صورة التصنيف" loading="lazy" hidden />
                </div>
                <div class="category-row-content">
                    <div class="text-right w-full">
                        <p data-category-hint="dessert" class="category-label-hint gold-text-soft mb-1">تصفح</p>
                        <h2 data-category-label="dessert" class="category-label-title gold-title">الحلى</h2>
                    </div>
                </div>
            </a>
            <a href="Front-end/menu.html?cat=custom1" class="category-row hidden" data-category-cover="custom1">
                <div class="category-img-wrap">
                    <img class="category-cover-img" alt="صورة التصنيف" loading="lazy" hidden />
                </div>
                <div class="category-row-content">
                    <div class="text-right w-full">
                        <p data-category-hint="custom1" class="category-label-hint gold-text-soft mb-1">تصفح</p>
                        <h2 data-category-label="custom1" class="category-label-title gold-title">صنف إضافي 1</h2>
                    </div>
                </div>
            </a>
            <a href="Front-end/menu.html?cat=custom2" class="category-row hidden" data-category-cover="custom2">
                <div class="category-img-wrap">
                    <img class="category-cover-img" alt="صورة التصنيف" loading="lazy" hidden />
                </div>
                <div class="category-row-content">
                    <div class="text-right w-full">
                        <p data-category-hint="custom2" class="category-label-hint gold-text-soft mb-1">تصفح</p>
                        <h2 data-category-label="custom2" class="category-label-title gold-title">صنف إضافي 2</h2>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script src="config-scripts/js_categories.js"></script>
    <script src="config-scripts/js_home.js"></script>
    <script src="config-scripts/bottom-nav.js"></script>
    <script>
        async function bootHome() {
            const s = await loadAppSettings();
            applyHomeSettings(s);
        }
        // التشغيل
        document.addEventListener("DOMContentLoaded", () => {
            bootHome();
        });
        window.addEventListener("supabaseReady", bootHome);
    </script>
</body>
</html>
